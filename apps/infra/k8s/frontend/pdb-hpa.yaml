---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: farmassist-web-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: farmassist-web
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: farmassist-web-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: farmassist-web
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
