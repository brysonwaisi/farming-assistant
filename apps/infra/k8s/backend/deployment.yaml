---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: farmassist-backend
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: farmassist
  labels:
    app: farmassist
    app.kubernetes.io/name: farming-assistant
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kubectl
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  replicas: 3
  selector:
    matchLabels:
      app: farmassist
  template:
    metadata:
      labels:
        app: farmassist
        app.kubernetes.io/name: farming-assistant
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: farmassist-backend
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: farmassist
              topologyKey: kubernetes.io/hostname
      imagePullSecrets:
      - name: my-registry-key
      containers:
      - name: farmassist
        image: docker.io/nyamwange/backend:v1
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          httpGet:
            path: /health
            port: 5000
          periodSeconds: 2
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]
        resources:
          requests:
            memory: 64Mi
            cpu: 100m
          limits:
            memory: 128Mi
            cpu: 300m