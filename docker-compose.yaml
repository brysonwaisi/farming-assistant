services:
  api:
    container_name: farming-assistant-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo_db:27017
      DB_NAME: farming_assistant
      CLIENT_URL: http://localhost:5173
    env_file:
      - apps/api/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongo_db
    volumes:
      - .:/repo
      - /repo/node_modules

  web:
    container_name: farming-assistant-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api/
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - .:/repo
      - /repo/node_modules

  mongo_db:
    container_name: farming-assistant-mongo
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: {}
